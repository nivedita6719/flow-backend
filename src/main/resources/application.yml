
spring:
  application:
    name: flow-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/flowdb}
    username: ${SPRING_DATASOURCE_USERNAME:flowuser}
    password: ${SPRING_DATASOURCE_PASSWORD:flowpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'UTC'

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true



  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false}

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false

app:
  jwt:
    secret: ${APP_JWT_SECRET:flow-super-secret-key-minimum-256-bits-long-for-security}
    expiration: ${APP_JWT_EXPIRATION:86400000}
  gemini:
    api-key: ${APP_GEMINI_API_KEY:AIzaSyBzxxMmSUaoN8RPwctvQW1idUgtm_o7Wmw}
    api-url: ${APP_GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000}